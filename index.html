<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>楽天/Amazon 順位モニター — limit48</title>
<style>
:root {
  --bg: #0A1628;
  --surface: #0F1F38;
  --dim: rgba(255,255,255,0.03);
  --border: rgba(74,144,217,0.14);
  --text: #D6E4F7;
  --text-2: #6B8BB0;
  --accent: #4A90D9;
  --rakuten: #C8281A;
  --amazon: #FF9900;
  --good: #3ABF8A;
  --warn: #E8A825;
  --pr-col: #9B6DFF;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);min-height:100vh}
body{color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased}

#app{max-width:900px;margin:0 auto;padding:36px 20px 72px}

/* Header */
.hd{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.hd-eyebrow{font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
.hd-title{font-size:1.25rem;font-weight:700;letter-spacing:-.025em}
.hd-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.hd-updated{font-size:.72rem;color:var(--text-2);font-variant-numeric:tabular-nums}
.hd-updated span{color:var(--text)}

/* Platform Tabs */
.tabs{display:flex;gap:8px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:1px}
.tab{padding:10px 20px;font-size:.85rem;font-weight:700;color:var(--text-2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:8px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.tab-icon{width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:900;color:#fff}
.tab-rakuten.active .tab-icon{background:var(--rakuten)}
.tab-amazon.active .tab-icon{background:var(--amazon)}

/* Cards */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px}
@media(max-width:600px){.grid{grid-template-columns:1fr}}

.card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:24px 20px 18px;display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;transition:border-color .2s}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.card.oor::after{background:var(--warn)}

.card-kw{font-size:.63rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-2)}

.rank-row{display:flex;align-items:center;gap:8px;min-height:68px}
.rank-num{font-size:4.8rem;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.045em;line-height:1;color:#fff}
.rank-unit{font-size:1.05rem;color:var(--text-2);font-weight:500;align-self:flex-end;padding-bottom:6px}
.rank-oor{display:flex;flex-direction:column;gap:3px;min-height:68px;justify-content:center}
.rank-oor-big{font-size:2.4rem;font-weight:800;color:var(--warn);letter-spacing:-.03em;line-height:1}
.rank-oor-sub{font-size:.66rem;color:var(--text-2)}

.pr-badge{display:inline-flex;flex-direction:column;align-items:flex-start;gap:2px;margin-left:2px;padding-bottom:6px;align-self:flex-end}
.pr-count{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;background:rgba(155,109,255,0.15);border:1px solid rgba(155,109,255,0.35);border-radius:3px;font-size:.62rem;font-weight:700;color:var(--pr-col);letter-spacing:0;white-space:nowrap}
.pr-dot{width:5px;height:5px;border-radius:50%;background:var(--pr-col)}

.organic-row{display:flex;align-items:center;gap:6px;font-size:.72rem}
.organic-label{color:var(--text-2)}
.organic-val{font-variant-numeric:tabular-nums;font-weight:700}
.organic-val.good{color:var(--good)}
.organic-val.norm{color:var(--text)}

.change{font-size:.72rem;display:flex;align-items:center;gap:4px;color:var(--text-2)}
.change.up{color:var(--good)}
.change.dn{color:var(--warn)}

.sparkwrap{margin-top:4px;border-top:1px solid var(--border);padding-top:10px;height:52px}
.sparkwrap svg{width:100%;height:36px;overflow:visible;display:block}
.spark-empty{height:36px;display:flex;align-items:center;justify-content:center;font-size:.62rem;color:var(--text-2);opacity:.6}

.actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:4px;font-size:.78rem;font-weight:600;cursor:pointer;border:none;text-decoration:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--accent);color:#fff}
.btn-ghost{background:var(--dim);border:1px solid var(--border);color:var(--text-2)}

.loading{display:flex;align-items:center;justify-content:center;min-height:200px;font-size:.85rem;color:var(--text-2)}
.error-box{padding:16px 20px;background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.2);border-radius:4px;font-size:.8rem;color:#F87171;margin-bottom:20px}

.strip{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--dim);border:1px solid var(--border);border-radius:4px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--good);flex-shrink:0;box-shadow:0 0 8px var(--good);animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.strip-txt{font-size:.74rem;color:var(--text-2);line-height:1.5}

.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

footer{margin-top:40px;text-align:center;font-size:.6rem;color:var(--text-2);opacity:.5}
</style>
</head>
<body>
<div id="app">
  <header class="hd">
    <div>
      <div class="hd-eyebrow">limit48</div>
      <h1 class="hd-title">楽天/Amazon 検索順位モニター</h1>
    </div>
    <div class="hd-right">
      <div class="hd-updated">最終チェック <span id="last-check">読み込み中...</span></div>
    </div>
  </header>

  <div class="tabs">
    <div class="tab tab-rakuten active" onclick="switchTab('rakuten')"><div class="tab-icon">R</div>楽天市場</div>
    <div class="tab tab-amazon" onclick="switchTab('amazon')"><div class="tab-icon">A</div>Amazon.co.jp</div>
  </div>

  <div id="error-area"></div>

  <div class="actions">
    <button class="btn btn-primary" id="btn-refresh" onclick="loadData()">
      <span id="refresh-icon">↻</span> 更新
    </button>
    <a class="btn btn-ghost" id="btn-actions" href="https://github.com/gyomu-source/limit48-rank-monitor/actions/workflows/check.yml" target="_blank">▶ 今すぐチェック実行</a>
  </div>

  <div id="main-content"><div class="loading">データを読み込み中...</div></div>

  <div class="strip" style="margin-top:24px">
    <div class="dot"></div>
    <div class="strip-txt"><strong>朝7時・夕18時</strong> 自動チェック実行。PR/スポンサー広告を含めた「トータル順位」を監視します。</div>
  </div>

  <footer>limit48 EC Management · Rakuten & Amazon Scraper</footer>
</div>

<script>
const KEYWORDS = ['ファスティング', '酵素ドリンク'];
let currentPlatform = 'rakuten';
let fullHistory = [];

async function loadData() {
  const btn = document.getElementById('btn-refresh');
  const icon = document.getElementById('refresh-icon');
  btn.disabled = true;
  icon.innerHTML = '<span class="spin"></span>';

  try {
    const res = await fetch(`rank_history.json?v=${Date.now()}`);
    fullHistory = await res.json();
    renderDashboard();
  } catch(e) {
    document.getElementById('error-area').innerHTML = `<div class="error-box">データ取得エラー: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    icon.textContent = '↻';
  }
}

function switchTab(platform) {
  currentPlatform = platform;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab-${platform}`).classList.add('active');
  renderDashboard();
}

function renderDashboard() {
  if (!fullHistory.length) return;
  const latest = fullHistory[fullHistory.length - 1];
  document.getElementById('last-check').textContent = `${latest.dateStr} ${latest.timeStr} JST`;

  const grid = document.createElement('div');
  grid.className = 'grid';

  KEYWORDS.forEach(kw => {
    const getResult = (h) => {
      if (h.results[currentPlatform]) return h.results[currentPlatform][kw];
      return currentPlatform === 'rakuten' ? h.results[kw] : null;
    };

    const currentResult = getResult(latest) || {};
    const kwHistory = fullHistory.map(h => ({
      r: getResult(h)?.rank || null
    }));

    grid.appendChild(buildCard(kw, currentResult, kwHistory));
  });

  document.getElementById('main-content').innerHTML = '';
  document.getElementById('main-content').appendChild(grid);

  requestAnimationFrame(() => {
    KEYWORDS.forEach(kw => {
      const getResult = (h) => {
        if (h.results[currentPlatform]) return h.results[currentPlatform][kw];
        return currentPlatform === 'rakuten' ? h.results[kw] : null;
      };
      const r = getResult(latest)?.rank;
      if (r) animateNum(document.getElementById(`rn-${kw}`), r, 600);
      
      const hist = fullHistory.map(h => ({ r: getResult(h)?.rank || null }));
      const sv = document.getElementById(`sv-${kw}`);
      if (sv) drawSpark(sv, hist);
    });
  });
}

function buildCard(kw, result, kwHistory) {
  const rank = result.rank || null;
  const organic = result.organicRank || null;
  const pr = result.prCount != null ? result.prCount : null;
  const oor = rank === null;

  const card = document.createElement('div');
  card.className = 'card' + (oor ? ' oor' : '');
  
  const change = (() => {
    const valid = kwHistory.filter(h => h.r !== null);
    if (valid.length < 2) return null;
    const diff = valid[valid.length - 2].r - valid[valid.length - 1].r;
    if (diff > 0) return `<span class="change up">▲ ${diff}位 上昇</span>`;
    if (diff < 0) return `<span class="change dn">▼ ${Math.abs(diff)}位 下降</span>`;
    return '<span class="change">変動なし</span>';
  })();

    const prLabel = currentPlatform === 'amazon' ? 'スポンサー' : 'PR';
    card.innerHTML = `
    <div class="card-kw">${kw}</div>
    <div class="rank-row">
      ${oor ? '<div class="rank-oor"><div class="rank-oor-big">圏外</div><div class="rank-oor-sub">100位以内に未登場</div></div>' : 
      `<div class="rank-num" id="rn-${kw}">—</div><div class="rank-unit">位</div>`}
      <div class="pr-badge"><div class="pr-count"><div class="pr-dot"></div>${prLabel} ${pr !== null ? pr : '—'}件</div></div>
    </div>
    <div class="organic-row">
      <span class="organic-label">純粋順位</span>
      <span class="organic-val ${organic <= 10 ? 'good' : 'norm'}">${organic || '—'}位</span>
    </div>
    ${change || ''}
    <div class="sparkwrap"><svg id="sv-${kw}" viewBox="0 0 200 36" preserveAspectRatio="none"></svg></div>
  `;
  return card;
}

function animateNum(el, target, ms) {
  if (!el) return;
  const start = performance.now();
  function tick(now) {
    const t = Math.min((now - start) / ms, 1);
    el.textContent = Math.round((1 - Math.pow(1 - t, 3)) * target);
    if (t < 1) requestAnimationFrame(tick); else el.textContent = target;
  }
  requestAnimationFrame(tick);
}

function drawSpark(svgEl, history) {
  const pts = history.filter(h => h.r !== null).slice(-20);
  if (pts.length < 2) return;
  const W = 200, H = 36, PAD = 4;
  const ranks = pts.map(p => p.r);
  const lo = Math.min(...ranks), hi = Math.max(...ranks);
  const spread = hi - lo || 1;
  let path = `M ${PAD} ${H - PAD - ((ranks[0] - lo) / spread) * (H - PAD * 2)}`;
  ranks.forEach((r, i) => {
    const x = PAD + (i / (ranks.length - 1)) * (W - PAD * 2);
    const y = H - PAD - ((r - lo) / spread) * (H - PAD * 2);
    path += ` L ${x} ${y}`;
  });
  svgEl.innerHTML = `<path d="${path}" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />`;
}

loadData();
</script>
</body>
</html>
