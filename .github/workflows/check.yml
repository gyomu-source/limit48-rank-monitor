name: 楽天 順位チェック

on:
  schedule:
    - cron: '0 22 * * *'   # 07:00 JST (UTC+9)
    - cron: '0 9 * * *'    # 18:00 JST
  workflow_dispatch:         # 手動実行ボタン

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 順位チェック実行
        env:
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
        run: node check_rank.js

      - name: 結果をコミット＆プッシュ
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add rank_history.json
          git diff --staged --quiet || git commit -m "rank update $(TZ='Asia/Tokyo' date +'%Y-%m-%d %H:%M JST')"
          git push
