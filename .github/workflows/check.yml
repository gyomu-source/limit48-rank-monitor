name: 楽天 順位チェック

on:
  schedule:
    - cron: '0 22 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install puppeteer

      - name: 順位チェック実行
        run: node check_rank.js

      - name: 結果をコミット＆プッシュ
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add rank_history.json
          git diff --staged --quiet || git commit -m "rank update $(TZ='Asia/Tokyo' date +'%Y-%m-%d %H:%M JST')"
          git push
