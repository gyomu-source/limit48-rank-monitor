name: 順位チェック (楽天 & Amazon)

on:
  schedule:
    - cron: '0 22 * * *' # 日本時間 7:00
    - cron: '0 9 * * *'  # 日本時間 18:00
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install pandas

      - name: Install Puppeteer and dependencies
        run: |
          npm install
          npx puppeteer browsers install chrome

      - name: 順位チェック実行
        run: node check_rank.js

      - name: グラフデータ生成
        run: python3 prepare_chart_data.py

      - name: 結果をコミット＆プッシュ
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add rank_history.json chart_data.json
          git diff --staged --quiet || (git commit -m "rank update $(TZ='Asia/Tokyo' date +'%Y-%m-%d %H:%M JST')" && git push)
